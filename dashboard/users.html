<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users – FastGrowth Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-header"><i class="fas fa-bolt"></i><span>FastGrowth</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="index.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="analytics.html" class="sidebar-link"><i class="fas fa-chart-bar"></i> Analytics</a>
      <a href="messages.html" class="sidebar-link"><i class="fas fa-envelope"></i> Messages</a>
      <div class="nav-section-label">Manage</div>
      <a href="users.html" class="sidebar-link active"><i class="fas fa-users"></i> Users</a>
      <a href="blog.html" class="sidebar-link"><i class="fas fa-blog"></i> Blog</a>
      <div class="nav-section-label">Account</div>
      <a href="profile.html" class="sidebar-link"><i class="fas fa-user"></i> Profile</a>
      <a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i> Settings</a>
    </nav>
    <div class="sidebar-footer"><a href="#" class="sidebar-link logout-btn" style="padding:0;"><i class="fas fa-sign-out-alt"></i> Logout</a></div>
  </aside>

  <div class="dashboard-main">
    <header class="dashboard-topbar">
      <div class="topbar-left">
        <button id="sidebarToggle" class="btn btn-ghost"><i class="fas fa-bars"></i></button>
        <span class="topbar-title">Users</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost theme-toggle topbar-icon"><i class="theme-icon fas fa-moon"></i></button>
        <div class="user-avatar">A</div>
      </div>
    </header>

    <main class="dashboard-content">
      <div class="table-card">
        <div class="table-header">
          <h3>All Users</h3>
          <div class="d-flex gap-2">
            <input type="text" class="form-control" placeholder="Search users…" style="width:220px;" id="userSearch" />
            <button class="btn btn-primary btn-sm" id="addUserBtn"><i class="fas fa-plus"></i> Add User</button>
          </div>
        </div>
        <table class="data-table" id="usersTable">
          <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Joined</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="usersBody"><tr><td colspan="6" style="text-align:center;color:var(--text-muted);">Loading…</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<!-- Add User Modal -->
<div id="userModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:10000;align-items:center;justify-content:center;">
  <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:90%;max-width:460px;box-shadow:var(--shadow-lg);">
    <h3 style="margin-bottom:1.5rem;">Add New User</h3>
    <form id="addUserForm">
      <div class="form-group"><label>Full Name</label><input type="text" name="name" class="form-control" required /><span class="error-msg"></span></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" class="form-control" required /><span class="error-msg"></span></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" class="form-control" required minlength="8" /><span class="error-msg"></span></div>
      <div class="form-group"><label>Role</label>
        <select name="role" class="form-control"><option value="editor">Editor</option><option value="admin">Admin</option></select>
      </div>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1rem;">
        <button type="button" id="cancelUserModal" class="btn btn-outline btn-sm">Cancel</button>
        <button type="submit" class="btn btn-primary btn-sm">Create User</button>
      </div>
    </form>
  </div>
</div>

<script src="../assets/js/theme.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/dashboard.js"></script>
<script>
  async function loadUsers() {
    const tbody = document.getElementById('usersBody');
    try {
      const res = await api.users.list();
      if (!res.data.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">No users found</td></tr>';
        return;
      }
      tbody.innerHTML = res.data.map(u => `
        <tr id="user-${u.id}">
          <td><div style="display:flex;align-items:center;gap:0.75rem;">
            <div class="user-avatar" style="width:32px;height:32px;font-size:0.75rem;">${u.name.charAt(0)}</div>${u.name}
          </div></td>
          <td>${u.email}</td>
          <td>${statusBadge(u.role)}</td>
          <td>${formatDate(u.created_at)}</td>
          <td>${statusBadge(u.status)}</td>
          <td>
            <button class="btn btn-ghost btn-sm" onclick="toggleStatus(${u.id}, '${u.status}')"><i class="fas fa-toggle-${u.status === 'active' ? 'on' : 'off'}"></i></button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger);" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i></button>
          </td>
        </tr>`).join('');
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--danger);">${err.message}</td></tr>`;
    }
  }

  async function toggleStatus(id, current) {
    const newStatus = current === 'active' ? 'inactive' : 'active';
    try {
      await api.users.update(id, { status: newStatus });
      showToast(`User ${newStatus}`);
      loadUsers();
    } catch (err) { showToast(err.message, 'danger'); }
  }

  async function deleteUser(id) {
    if (!await confirmAction('Delete this user? This cannot be undone.')) return;
    try {
      await api.users.delete(id);
      document.getElementById(`user-${id}`)?.remove();
      showToast('User deleted');
    } catch (err) { showToast(err.message, 'danger'); }
  }

  // Add user modal
  const modal = document.getElementById('userModal');
  document.getElementById('addUserBtn').onclick    = () => modal.style.display = 'flex';
  document.getElementById('cancelUserModal').onclick = () => modal.style.display = 'none';

  document.getElementById('addUserForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = this.querySelector('[type="submit"]');
    btn.disabled = true;
    try {
      await api.users.create({
        name:     this.name.value.trim(),
        email:    this.email.value.trim(),
        password: this.password.value,
        role:     this.role.value,
      });
      modal.style.display = 'none';
      this.reset();
      showToast('User created successfully');
      loadUsers();
    } catch (err) {
      showToast(err.message, 'danger');
    } finally {
      btn.disabled = false;
    }
  });

  // Search
  document.getElementById('userSearch').addEventListener('input', function () {
    const q = this.value.toLowerCase();
    document.querySelectorAll('#usersBody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  loadUsers();
</script>
</body>
</html>
