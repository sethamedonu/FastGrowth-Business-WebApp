<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile – FastGrowth Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-header"><i class="fas fa-bolt"></i><span>FastGrowth</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="index.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="analytics.html" class="sidebar-link"><i class="fas fa-chart-bar"></i> Analytics</a>
      <a href="messages.html" class="sidebar-link"><i class="fas fa-envelope"></i> Messages</a>
      <div class="nav-section-label">Manage</div>
      <a href="users.html" class="sidebar-link"><i class="fas fa-users"></i> Users</a>
      <a href="blog.html" class="sidebar-link"><i class="fas fa-blog"></i> Blog</a>
      <div class="nav-section-label">Account</div>
      <a href="profile.html" class="sidebar-link active"><i class="fas fa-user"></i> Profile</a>
      <a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i> Settings</a>
    </nav>
    <div class="sidebar-footer"><a href="#" class="sidebar-link logout-btn" style="padding:0;"><i class="fas fa-sign-out-alt"></i> Logout</a></div>
  </aside>

  <div class="dashboard-main">
    <header class="dashboard-topbar">
      <div class="topbar-left">
        <button id="sidebarToggle" class="btn btn-ghost"><i class="fas fa-bars"></i></button>
        <span class="topbar-title">Profile</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost theme-toggle topbar-icon"><i class="theme-icon fas fa-moon"></i></button>
        <div class="user-avatar">A</div>
      </div>
    </header>

    <main class="dashboard-content">
      <div class="profile-header">
        <div class="profile-avatar">A</div>
        <h2>Admin User</h2>
        <p>admin@fastgrowth.com · Administrator</p>
        <div style="display:flex;gap:1rem;justify-content:center;margin-top:1rem;">
          <span style="background:rgba(255,255,255,0.2);padding:0.25rem 0.75rem;border-radius:9999px;font-size:0.75rem;">Member since Jan 2025</span>
          <span style="background:rgba(255,255,255,0.2);padding:0.25rem 0.75rem;border-radius:9999px;font-size:0.75rem;">Last login: Today</span>
        </div>
      </div>

      <div class="settings-grid">
        <div class="settings-card">
          <h3><i class="fas fa-user" style="color:var(--primary);margin-right:0.5rem;"></i>Personal Information</h3>
          <form onsubmit="event.preventDefault();showToast('Profile updated!')">
            <div class="grid-2" style="gap:1rem;">
              <div class="form-group"><label>First Name</label><input type="text" class="form-control" value="Admin" /></div>
              <div class="form-group"><label>Last Name</label><input type="text" class="form-control" value="User" /></div>
            </div>
            <div class="form-group"><label>Email</label><input type="email" class="form-control" value="admin@fastgrowth.com" /></div>
            <div class="form-group"><label>Phone</label><input type="text" class="form-control" value="+1 (555) 000-0000" /></div>
            <div class="form-group"><label>Job Title</label><input type="text" class="form-control" value="Administrator" /></div>
            <div class="form-group"><label>Bio</label><textarea class="form-control" rows="3">Platform administrator for FastGrowth Business Platform.</textarea></div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Profile</button>
          </form>
        </div>

        <div class="settings-card">
          <h3><i class="fas fa-chart-bar" style="color:var(--primary);margin-right:0.5rem;"></i>Activity Summary</h3>
          <div style="display:flex;flex-direction:column;gap:1rem;">
            <div class="stat-card" style="padding:1rem;">
              <div class="stat-icon blue"><i class="fas fa-envelope"></i></div>
              <div class="stat-info"><h3>48</h3><p>Messages Handled</p></div>
            </div>
            <div class="stat-card" style="padding:1rem;">
              <div class="stat-icon green"><i class="fas fa-blog"></i></div>
              <div class="stat-info"><h3>12</h3><p>Posts Published</p></div>
            </div>
            <div class="stat-card" style="padding:1rem;">
              <div class="stat-icon purple"><i class="fas fa-users"></i></div>
              <div class="stat-info"><h3>4</h3><p>Users Managed</p></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../assets/js/theme.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/dashboard.js"></script>
</body>
</html>
