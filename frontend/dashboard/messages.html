<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages – FastGrowth Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-header"><i class="fas fa-bolt"></i><span>FastGrowth</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="index.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="analytics.html" class="sidebar-link"><i class="fas fa-chart-bar"></i> Analytics</a>
      <a href="messages.html" class="sidebar-link active"><i class="fas fa-envelope"></i> Messages</a>
      <div class="nav-section-label">Manage</div>
      <a href="users.html" class="sidebar-link"><i class="fas fa-users"></i> Users</a>
      <a href="blog.html" class="sidebar-link"><i class="fas fa-blog"></i> Blog</a>
      <div class="nav-section-label">Account</div>
      <a href="profile.html" class="sidebar-link"><i class="fas fa-user"></i> Profile</a>
      <a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i> Settings</a>
    </nav>
    <div class="sidebar-footer"><a href="#" class="sidebar-link logout-btn" style="padding:0;"><i class="fas fa-sign-out-alt"></i> Logout</a></div>
  </aside>

  <div class="dashboard-main">
    <header class="dashboard-topbar">
      <div class="topbar-left">
        <button id="sidebarToggle" class="btn btn-ghost"><i class="fas fa-bars"></i></button>
        <span class="topbar-title">Messages</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost theme-toggle topbar-icon"><i class="theme-icon fas fa-moon"></i></button>
        <div class="user-avatar">A</div>
      </div>
    </header>

    <main class="dashboard-content">
      <div class="table-card">
        <div class="table-header">
          <h3>All Messages</h3>
          <input type="text" class="form-control" placeholder="Search…" style="width:220px;" id="msgSearch" />
        </div>
        <table class="data-table" id="msgTable">
          <thead><tr><th>From</th><th>Email</th><th>Subject</th><th>Service</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="msgBody"><tr><td colspan="7" style="text-align:center;color:var(--text-muted);">Loading…</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<script src="../assets/js/theme.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/dashboard.js"></script>
<script>
  async function loadMessages() {
    const tbody = document.getElementById('msgBody');
    try {
      const res = await api.messages.list();
      if (!res.data.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);">No messages found</td></tr>';
        return;
      }
      tbody.innerHTML = res.data.map(m => `
        <tr id="msg-${m.id}">
          <td>${m.name}</td>
          <td>${m.email}</td>
          <td>${m.subject}</td>
          <td>${m.service || '—'}</td>
          <td>${formatDate(m.created_at)}</td>
          <td>${statusBadge(m.status)}</td>
          <td>
            <button class="btn btn-primary btn-sm" onclick="markReplied(${m.id})"><i class="fas fa-reply"></i></button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger);" onclick="deleteMessage(${m.id})"><i class="fas fa-trash"></i></button>
          </td>
        </tr>`).join('');
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--danger);">${err.message}</td></tr>`;
    }
  }

  async function markReplied(id) {
    try {
      await api.messages.updateStatus(id, 'replied');
      showToast('Marked as replied');
      loadMessages();
    } catch (err) { showToast(err.message, 'danger'); }
  }

  async function deleteMessage(id) {
    if (!await confirmAction('Delete this message? This cannot be undone.')) return;
    try {
      await api.messages.delete(id);
      document.getElementById(`msg-${id}`)?.remove();
      showToast('Message deleted');
    } catch (err) { showToast(err.message, 'danger'); }
  }

  // Search filter
  document.getElementById('msgSearch').addEventListener('input', function () {
    const q = this.value.toLowerCase();
    document.querySelectorAll('#msgBody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  loadMessages();
</script>
</body>
</html>
